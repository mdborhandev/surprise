<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fahamida's Birthday Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes confetti { 0% { transform: translateY(-100vh) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        @keyframes revealPulse { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.5); opacity: 0; } }
        @keyframes sparkle { 0%,100% { opacity: 0; transform: scale(0) rotate(0deg); } 50% { opacity: 1; transform: scale(1) rotate(180deg); } }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px) scale(0.8); } 20% { opacity: 1; transform: translateY(0) scale(1); } 80% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.6); } }
        @keyframes ring { 0% { transform: scale(0.5); opacity: 1; border-width: 3px; } 100% { transform: scale(2.5); opacity: 0; border-width: 0.5px; } }
        @keyframes drift { 0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) translateX(40px) rotate(360deg); opacity: 0; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; } 50% { transform: translateY(50vh) rotate(180deg) translateX(30px); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; } }
        @keyframes petalFall { 0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; } 50% { opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; } }
        @keyframes crackerBurst { 0% { transform: scale(0) rotate(0); opacity: 1; } 50% { transform: scale(1.2) rotate(180deg); opacity: 1; } 100% { transform: scale(0.8) rotate(360deg); opacity: 0; } }
        @keyframes rocketLaunch { 0% { bottom: -5%; opacity: 1; } 70% { opacity: 1; } 100% { bottom: 65%; opacity: 0; } }
        @keyframes rocketGlow { 0%,100% { box-shadow: 0 0 8px #FBBF24, 0 0 20px rgba(251,191,36,0.5); } 50% { box-shadow: 0 0 15px #FBBF24, 0 0 40px rgba(251,191,36,0.8); } }
        @keyframes burstDot { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
        @keyframes burstRing { 0% { transform: scale(0); opacity: 1; border-width: 3px; } 100% { transform: scale(3); opacity: 0; border-width: 0.5px; } }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        .fade-out { animation: fadeOut 0.5s ease forwards; }
        .slide-up { animation: slideUp 0.6s ease forwards; }
        .scale-in { animation: scaleIn 0.5s ease forwards; }

        /* Stars */
        .star { position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite; pointer-events: none; }

        /* Music Button */
        #music-btn { position: fixed; top: 52px; right: 12px; z-index: 201; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        #music-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* Skip Button */
        .skip-btn { position: fixed; bottom: 16px; right: 16px; z-index: 201; padding: 8px 18px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; }
        .skip-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

        /* Phase container */
        .phase { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; padding: 60px 20px 70px; overflow-y: auto; }
        .phase.active { display: flex; }

        /* Countdown */
        #countdown-phase { text-align: center; }
        .countdown-header { margin-bottom: 48px; }
        .countdown-tag { font-size: 14px; color: rgba(255,255,255,0.9); letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 24px; }
        .countdown-name { font-size: clamp(2.6rem, 10vw, 5rem); font-weight: 900; color: #fff; letter-spacing: 0.02em; margin-bottom: 24px; }
        .countdown-divider { width: 50px; height: 2px; background: rgba(251,191,36,0.5); margin: 0 auto 24px; }
        .countdown-sub { font-size: 15px; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; }
        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 600px; margin: 0 auto; }
        @media (max-width: 480px) { .countdown-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 340px; } }
        .count-box { position: relative; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.25); border-radius: 16px; padding: 32px 16px 24px; text-align: center; transition: border-color 0.4s ease; }
        .count-box:hover { border-color: rgba(255,255,255,0.5); }
        .count-num { font-size: clamp(3rem, 10vw, 5rem); font-weight: 700; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
        .count-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 12px; }

        /* Reveal */
        .reveal-box { text-align: center; max-width: 520px; position: relative; }
        .reveal-rings { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .reveal-ring { position: absolute; width: 200px; height: 200px; border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; top: 50%; left: 50%; margin: -100px 0 0 -100px; animation: ring 2s ease-out infinite; }
        .reveal-ring:nth-child(2) { animation-delay: 0.6s; }
        .reveal-ring:nth-child(3) { animation-delay: 1.2s; }
        .reveal-emoji { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 16px; display: block; animation: floatUp 3s ease-in-out infinite; }
        .reveal-title { font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 900; color: #fff; margin-bottom: 10px; line-height: 1.2; }
        .reveal-sub { font-size: clamp(14px, 3.5vw, 18px); color: rgba(255,255,255,0.5); margin-bottom: 20px; line-height: 1.5; }
        .reveal-divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); margin: 0 auto 20px; }
        .reveal-hint { font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; text-transform: uppercase; }
        .reveal-sparkle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: sparkle 1.5s ease-in-out infinite; pointer-events: none; }
        .reveal-anim-1 { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-anim-2 { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s; }
        .reveal-anim-3 { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s; }
        .reveal-anim-4 { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.45s; }
        .reveal-anim-5 { opacity: 0; transform: translateY(20px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.6s; }
        .reveal-show { opacity: 1 !important; transform: translateY(0) !important; }
        .typing-cursor::after { content: '|'; animation: blink 0.7s step-end infinite; color: rgba(255,255,255,0.5); font-weight: 300; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .reveal-continue { margin-top: 36px; opacity: 0; transition: opacity 0.6s ease 0.5s; }
        .reveal-continue.show { opacity: 1; }
        .reveal-continue button { padding: 14px 40px; border-radius: 30px; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 0.15em; cursor: pointer; transition: all 0.3s ease; }
        .reveal-continue button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }
        .reveal-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .reveal-particle { position: absolute; bottom: -10px; width: 3px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: drift linear infinite; }
        .reveal-glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 3s ease-in-out infinite; pointer-events: none; }
        .reveal-title { position: relative; }
        .reveal-sub { position: relative; }
        .celebration-layer { position: fixed; inset: 0; pointer-events: none; z-index: 101; overflow: hidden; }
        .confetti-continuous { position: absolute; top: -10px; animation: fall linear forwards; pointer-events: none; }
        .petal { position: absolute; top: -20px; font-size: 20px; animation: petalFall linear forwards; pointer-events: none; }
        .cracker-burst { position: absolute; font-size: 28px; animation: crackerBurst ease-out forwards; pointer-events: none; }
        .skyrocket { position: absolute; width: 5px; height: 24px; background: linear-gradient(to top, #F59E0B, #fff); border-radius: 3px 3px 0 0; animation: rocketLaunch var(--dur) cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        .skyrocket::after { content: ''; position: absolute; bottom: -10px; left: -4px; width: 14px; height: 14px; background: radial-gradient(circle, #FBBF24, #F59E0B, transparent); border-radius: 50%; animation: rocketGlow 0.15s ease-in-out infinite; }
        .skyrocket-trail { position: absolute; width: 2px; background: linear-gradient(to top, rgba(251,191,36,0.6), transparent); border-radius: 1px; pointer-events: none; }
        .firework-dot { position: absolute; border-radius: 50%; animation: burstDot 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; pointer-events: none; }
        .firework-ring { position: absolute; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; animation: burstRing 1s ease-out forwards; pointer-events: none; }

        /* Vintage Letter */
        .letter-scroll { width: 100%; max-width: 560px; margin: 0 auto; overflow-y: auto; max-height: 80vh; padding: 20px; }
        .letter-scroll::-webkit-scrollbar { width: 4px; }
        .letter-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .letter-scroll::-webkit-scrollbar-thumb { background: rgba(139,115,85,0.4); border-radius: 2px; }
        .vintage-paper {
            background: linear-gradient(135deg, #f5e6c8 0%, #ede0c8 25%, #f2e4c9 50%, #e8d5b0 75%, #f0deb8 100%);
            border-radius: 4px;
            padding: 0;
            position: relative;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 0 60px rgba(139,115,85,0.15);
            color: #2c1810;
            overflow: hidden;
        }
        .vintage-paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(139,115,85,0.08) 28px, rgba(139,115,85,0.08) 29px),
                radial-gradient(ellipse at 20% 50%, rgba(139,115,85,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(160,120,60,0.06) 0%, transparent 40%);
            pointer-events: none;
        }
        .vintage-paper::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 0% 0%, rgba(120,80,30,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(120,80,30,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(120,80,30,0.08) 0%, transparent 40%);
            pointer-events: none;
        }
        .vintage-border {
            position: absolute;
            inset: 8px;
            border: 1.5px solid rgba(139,115,85,0.3);
            pointer-events: none;
        }
        .vintage-border::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 0.5px solid rgba(139,115,85,0.2);
        }
        .vintage-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: rgba(139,115,85,0.4);
            border-style: solid;
            pointer-events: none;
        }
        .vintage-corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
        .vintage-corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
        .vintage-corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
        .vintage-corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }
        .letter-content { position: relative; z-index: 1; padding: 40px 36px; }
        .letter-header { text-align: center; margin-bottom: 30px; }
        .letter-ornament { font-size: 24px; color: rgba(139,115,85,0.5); margin-bottom: 12px; letter-spacing: 0.3em; }
        .letter-greeting { font-family: 'Great Vibes', cursive; font-size: clamp(2rem, 6vw, 3rem); color: #5a3a1a; margin-bottom: 8px; }
        .letter-dear { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #6b4c2a; font-style: italic; margin-bottom: 24px; }
        .letter-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 3vw, 17px); line-height: 1.9; color: #3d2b15; text-align: justify; }
        .letter-body p { margin-bottom: 14px; text-indent: 2em; }
        .letter-body p:first-child { text-indent: 0; }
        .letter-sign { text-align: right; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(139,115,85,0.2); }
        .letter-sign-text { font-family: 'Great Vibes', cursive; font-size: clamp(1.4rem, 4vw, 2rem); color: #5a3a1a; }
        .letter-sign-sub { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: rgba(90,58,26,0.5); font-style: italic; margin-top: 4px; }
        .letter-seal { text-align: center; margin-top: 24px; }
        .letter-seal-circle { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #8b4513, #654321); margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .letter-line { display: inline-block; width: 0; height: 1px; background: #3d2b15; overflow: hidden; animation: typeLine 0.5s ease forwards; }
        @keyframes typeLine { to { width: 100%; } }
        .letter-continue { text-align: center; margin-top: 30px; }
        .letter-continue button { padding: 14px 40px; border-radius: 30px; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 0.15em; cursor: pointer; transition: all 0.3s ease; }
        .letter-continue button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }
        .letter-reveal { opacity: 0; transform: translateY(15px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .letter-reveal.visible { opacity: 1; transform: translateY(0); }

        /* Quiz */
        .quiz-box { max-width: 480px; width: 100%; text-align: center; }
        .quiz-progress-text { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 20px; letter-spacing: 0.1em; text-transform: uppercase; }
        .quiz-q { font-size: clamp(1rem, 4vw, 1.4rem); margin-bottom: 28px; line-height: 1.5; color: rgba(255,255,255,0.9); }
        .quiz-opt { display: block; width: 100%; padding: 16px 18px; margin-bottom: 10px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-family: 'Orbitron', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.3s ease; text-align: left; letter-spacing: 0.02em; }
        .quiz-opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); color: #fff; }
        .quiz-opt.correct { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.5); color: #34D399; }
        .quiz-feedback { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.5); }

        /* Spin Wheel */
        .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 0 auto 28px; }
        @media (min-width: 640px) { .wheel-wrap { width: 300px; height: 300px; } }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transition: transform 4s cubic-bezier(0.17,0.67,0.12,0.99); overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        .wheel-seg { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #fff; z-index: 10; }
        .spin-btn { padding: 14px 44px; border-radius: 30px; background: #fff; color: #000; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.15em; border: none; cursor: pointer; transition: all 0.3s ease; }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.15); }
        .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
        .spin-result { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.5; max-width: 400px; }

        /* Reasons */
        .reasons-list { max-width: 520px; width: 100%; }
        .reason-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 14px; margin-bottom: 10px; transition: border-color 0.3s; }
        .reason-card:hover { border-color: rgba(255,255,255,0.15); }
        .reason-card img { width: 72px; height: 72px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        @media (min-width: 640px) { .reason-card img { width: 88px; height: 88px; } }
        .reason-num { font-size: 1.2rem; color: rgba(255,255,255,0.1); margin-bottom: 4px; }
        .reason-text { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
        @media (min-width: 640px) { .reason-text { font-size: 13px; } }

        /* Finale */
        .mosaic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 380px; margin: 0 auto 28px; }
        @media (min-width: 640px) { .mosaic { grid-template-columns: repeat(3, 1fr); max-width: 450px; gap: 10px; } }
        .mosaic img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; transition: transform 0.3s ease; border: 1px solid rgba(255,255,255,0.06); }
        .mosaic img:hover { transform: scale(1.03); }
        .letter { max-width: 480px; width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px 28px; margin: 0 auto; }
        .letter h2 { text-align: center; margin-bottom: 20px; font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 800; color: #fff; }
        .letter p { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 6px; }
        @media (min-width: 640px) { .letter p { font-size: 13px; } }
        .replay-btn { display: block; margin: 28px auto 0; padding: 12px 30px; border-radius: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; }
        .replay-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }

        /* Confetti */
        .confetti-piece { position: fixed; width: 8px; height: 8px; top: -10px; animation: confetti linear forwards; pointer-events: none; z-index: 300; }
    </style>
</head>
<body>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Music Button -->
    <button id="music-btn" class="hidden" onclick="toggleMusic()">&#9835;</button>

    <!-- COUNTDOWN -->
    <div id="countdown-phase" class="phase active" style="display:flex;">
        <div class="countdown-header">
            <p class="countdown-tag">Counting down to</p>
            <h1 id="title-name" class="countdown-name"></h1>
            <div class="countdown-divider"></div>
            <p class="countdown-sub">Something beautiful is on its way</p>
        </div>
        <div class="countdown-grid">
            <div class="count-box"><div id="cd-days" class="count-num">00</div><div class="count-label">Days</div></div>
            <div class="count-box"><div id="cd-hours" class="count-num">00</div><div class="count-label">Hours</div></div>
            <div class="count-box"><div id="cd-mins" class="count-num">00</div><div class="count-label">Minutes</div></div>

    const QUIZ = [

        { q: "How does my heart feel when I see you, {n}?", o: ["Skips a beat","Sings with joy","Feels complete","All of these"], a: 3, f: "My heart dances with joy, {n}!" },

    ];

    const SPIN_MSG = [

        "You are my sunshine, {n}!",

    const LETTER = [
        "Today is special because it's the day the most beautiful person in my life was born. Since you came into my life, every day has felt brighter, happier, and more meaningful. Your smile is my favorite sight, your laughter is my favorite sound, and your love is my greatest blessing.",
        "Thank you for filling my life with happiness, care, and endless love. You make my world a better place simply by being in it.",
        "On your birthday, I wish you all the happiness, success, love, and beautiful moments your heart desires. May your smile never fade, and may all your dreams come true.",
        "Always remember that you are deeply loved, cherished, and appreciated more than words can ever express.",
        "Happy Birthday, my love. I love you today, tomorrow, and always."
    ];

    // ========== STATE ==========
    let target, nickname, musicPlaying = false, slideTimer, countdownTimer;
    let currentSlide = 0, quizIdx = 0, quizScore = 0, quizLocked = false;
    let canSpin = true, busy = false, quizActive = false, surpriseStarted = false;

    // ========== INIT ==========
    async function init() {
        createStars();
        try {
            const r = await fetch('birthday.json');
            const d = await r.json();

            nickname = NICKNAMES[0];

            document.getElementById('reveal-title').textContent = "Happy Birthday " + d.name + "!";
            document.getElementById('reveal-sub').textContent = "Hey " + nickname + ", this is for you!";
        } catch(e) {
            target = new Date('2026-07-10T00:00:00').getTime();
            nickname = NICKNAMES[0];
            document.getElementById('title-name').textContent = "Fahamida's Birthday";
            document.getElementById('reveal-title').textContent = "Happy Birthday Fahamida!";
            document.getElementById('reveal-sub').textContent = "Hey " + nickname + ", this is for you!";
        }
        updateCD();
        countdownTimer = setInterval(updateCD, 1000);
    }

    function createStars() {
        const c = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
            c.appendChild(s);
        }
    }

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function nextNick() { const n = NICKNAMES[nicknameIdx % NICKNAMES.length]; nicknameIdx++; return n; }

    // ========== COUNTDOWN ==========
    function updateCD() {
        const diff = target - Date.now();
        if (diff <= 0) {
            clearInterval(countdownTimer);
            if (!surpriseStarted) {
                surpriseStarted = true;
                showPhase('countdown-phase', false);
                startSurprise();
            }
            return;
        }
        const d = Math.floor(diff / 864e5);
        const h = Math.floor((diff % 864e5) / 36e5);
        const m = Math.floor((diff % 36e5) / 6e4);
        const s = Math.floor((diff % 6e4) / 1e3);
        document.getElementById('cd-days').textContent = String(d).padStart(2, '0');
        document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
        document.getElementById('cd-mins').textContent = String(m).padStart(2, '0');
        document.getElementById('cd-secs').textContent = String(s).padStart(2, '0');
    }

    // ========== PHASE MANAGEMENT ==========
    function showPhase(id, show) {
        const el = document.getElementById(id);
        if (show) { el.classList.add('active'); el.style.display = 'flex'; }
        else {
            el.classList.remove('active'); el.style.display = 'none';
            // Clean up celebration layer
            const layer = el.querySelector('.celebration-layer');
            if (layer) layer.innerHTML = '';
        }
    }

    function startSurprise() {
        document.getElementById('music-btn').classList.add('hidden');
        const music = document.getElementById('bg-music');
        music.volume = 0.5;
        music.play().then(() => { musicPlaying = true; document.getElementById('music-btn').classList.remove('hidden'); document.getElementById('music-btn').innerHTML = '&#9835;'; })
        .catch(() => { document.getElementById('music-btn').innerHTML = '&#128263;'; });
        setTimeout(() => startPhase1(), 300);
    }

    function toggleMusic() {
        const m = document.getElementById('bg-music');
        const btn = document.getElementById('music-btn');
        if (musicPlaying) { m.pause(); btn.innerHTML = '&#128263;'; musicPlaying = false; }
        else { m.play().then(() => { btn.innerHTML = '&#9835;'; musicPlaying = true; }).catch(() => {}); }
    }

    // ========== CONFETTI ==========
    function confetti() {
        const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6'];
        for (let i = 0; i < 40; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.cssText = `left:${Math.random()*100}vw;background:${rand(colors)};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*2}s;`;
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }
    }

    // ========== CELEBRATION LAYER ==========
    let celebrationTimer = null;
    function startCelebration() {
        const layer = document.getElementById('celebration-layer');
        if (!layer) return;
        const petals = ['🌸','🌺','💮','🪷','🏵️','✨','💖','🎀','🎊'];
        const crackers = ['🎉','🎊','🎆','🎇','🥳'];

        function spawnConfetti() {
            const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6','#FB923C','#FCD34D'];
            for (let i = 0; i < 8; i++) {
                const c = document.createElement('div');
                c.className = 'confetti-continuous';
                const size = 4 + Math.random() * 6;
                const dur = 3 + Math.random() * 4;
                c.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${rand(colors)};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${dur}s;animation-delay:${Math.random()*1}s;`;
                layer.appendChild(c);
                setTimeout(() => c.remove(), (dur + 1) * 1000);
            }
        }

        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            const dur = 4 + Math.random() * 5;
            p.textContent = rand(petals);
            p.style.cssText = `left:${Math.random()*100}%;font-size:${16+Math.random()*14}px;animation-duration:${dur}s;animation-delay:${Math.random()*1}s;`;
            layer.appendChild(p);
            setTimeout(() => p.remove(), (dur + 1) * 1000);
        }

        function spawnCracker() {
            const c = document.createElement('div');
            c.className = 'cracker-burst';
            const dur = 1.5 + Math.random();
            c.textContent = rand(crackers);
            c.style.cssText = `left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation-duration:${dur}s;`;
            layer.appendChild(c);
            setTimeout(() => c.remove(), (dur + 0.5) * 1000);
        }

        function spawnRocket() {
            const rocket = document.createElement('div');
            rocket.className = 'skyrocket';
            const xPos = 8 + Math.random() * 84;
            const dur = 0.6 + Math.random() * 0.5;
            rocket.style.cssText = `left:${xPos}%;--dur:${dur}s;`;
            layer.appendChild(rocket);

            // Trailing sparks
            const trailInterval = setInterval(() => {
                const spark = document.createElement('div');
                spark.className = 'skyrocket-trail';
                const h = 10 + Math.random() * 25;
                spark.style.cssText = `left:${xPos + (Math.random()-0.5)*0.8}%;bottom:${3 + Math.random()*65}%;height:${h}px;opacity:${0.4+Math.random()*0.5};`;
                layer.appendChild(spark);
                setTimeout(() => spark.remove(), 350);
            }, 40);

            // Explode at top
            setTimeout(() => {
                clearInterval(trailInterval);
                rocket.remove();
                burstFirework(xPos);
            }, dur * 1000 + 100);
        }

        function burstFirework(xPos) {
            const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6','#FB923C','#FCD34D','#fff'];
            const burstTop = 15 + Math.random() * 40;

            // Big ring burst
            const ring = document.createElement('div');
            ring.className = 'firework-ring';
            ring.style.cssText = `left:${xPos}%;top:${burstTop}%;width:10px;height:10px;margin-left:-5px;margin-top:-5px;`;
            layer.appendChild(ring);
            setTimeout(() => ring.remove(), 1100);

            // Second ring
            setTimeout(() => {
                const ring2 = document.createElement('div');
                ring2.className = 'firework-ring';
                ring2.style.cssText = `left:${xPos}%;top:${burstTop}%;width:10px;height:10px;margin-left:-5px;margin-top:-5px;border-color:${rand(colors)};`;
                layer.appendChild(ring2);
                setTimeout(() => ring2.remove(), 1100);
            }, 100);

            // Main burst — 36 dots
            for (let i = 0; i < 36; i++) {
                const dot = document.createElement('div');
                dot.className = 'firework-dot';
                const angle = (i / 36) * 360 + Math.random() * 10;
                const dist = 50 + Math.random() * 120;
                const rad = angle * Math.PI / 180;
                const tx = Math.cos(rad) * dist;
                const ty = Math.sin(rad) * dist - 30;
                const size = 4 + Math.random() * 8;
                dot.style.cssText = `left:${xPos}%;top:${burstTop}%;width:${size}px;height:${size}px;background:${rand(colors)};--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random()*0.15}s;`;
                layer.appendChild(dot);
                setTimeout(() => dot.remove(), 1400);
            }

            // Secondary burst — 16 smaller dots
            setTimeout(() => {
                for (let i = 0; i < 16; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'firework-dot';
                    const angle = (i / 16) * 360 + Math.random() * 20;
                    const dist = 25 + Math.random() * 60;
                    const rad = angle * Math.PI / 180;
                    const tx = Math.cos(rad) * dist;
                    const ty = Math.sin(rad) * dist;
                    const size = 3 + Math.random() * 4;
                    dot.style.cssText = `left:${xPos}%;top:${burstTop}%;width:${size}px;height:${size}px;background:${rand(colors)};--tx:${tx}px;--ty:${ty}px;animation-duration:0.8s;`;
                    layer.appendChild(dot);
                    setTimeout(() => dot.remove(), 900);
                }
            }, 120);

            // Triple burst — tiny sparkles
            setTimeout(() => {
                for (let i = 0; i < 10; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'firework-dot';
                    const angle = Math.random() * 360;
                    const dist = 15 + Math.random() * 30;
                    const rad = angle * Math.PI / 180;
                    dot.style.cssText = `left:${xPos}%;top:${burstTop}%;width:2px;height:2px;background:#fff;--tx:${Math.cos(rad)*dist}px;--ty:${Math.sin(rad)*dist}px;animation-duration:0.5s;`;
                    layer.appendChild(dot);
                    setTimeout(() => dot.remove(), 600);
                }
            }, 250);
        }

        // Initial burst
        spawnConfetti();
        spawnPetal();
        spawnCracker();
        spawnRocket();
        setTimeout(spawnRocket, 300);
        setTimeout(spawnRocket, 600);

        // Continuous loop
        celebrationTimer = setInterval(() => {
            spawnConfetti();
            spawnConfetti();
            spawnPetal();
            spawnPetal();
            spawnPetal();
            spawnCracker();
            spawnRocket();
            if (Math.random() > 0.3) spawnRocket();
            if (Math.random() > 0.5) spawnRocket();
        }, 1000);
    }

    function stopCelebration() {
        if (celebrationTimer) { clearInterval(celebrationTimer); celebrationTimer = null; }
    }

    // ========== PHASE 1: REVEAL ==========
    function startPhase1() {
        busy = true;
        showPhase('phase1', true);
        const titleEl = document.getElementById('reveal-title');
        const subEl = document.getElementById('reveal-sub');
        const titleText = titleEl.textContent;
        const subText = subEl.textContent;
        titleEl.textContent = '';
        subEl.textContent = '';

        setTimeout(() => {
            document.querySelectorAll('#p1-content [class*="reveal-anim"]').forEach(el => el.classList.add('reveal-show'));
            confetti();
            createSparkles();
            startCelebration();

            typeText(titleEl, titleText, 80, () => {
                // Type subtitle after title finishes
                typeText(subEl, subText, 60, () => {
                    // Show continue button after everything typed
                    document.getElementById('reveal-continue').classList.add('show');
                });
            });
        }, 300);
    }

    function typeText(el, text, speed, callback) {
        el.classList.add('typing-cursor');
        let i = 0;
        const interval = setInterval(() => {
            el.textContent = text.substring(0, i + 1);
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                setTimeout(() => { el.classList.remove('typing-cursor'); }, 800);
                if (callback) callback();
            }
        }, speed);
    }

    function createSparkles() {
        const c = document.getElementById('reveal-sparkles');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'reveal-sparkle';
            s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1+Math.random()*1.5}s;`;
            c.appendChild(s);
        }
        // Floating particles that continuously drift upward
        const pc = document.getElementById('reveal-particles');
        if (!pc) return;
        pc.innerHTML = '';
        function spawnParticle() {
            const p = document.createElement('div');
            p.className = 'reveal-particle';
            const size = 2 + Math.random() * 4;
            const dur = 6 + Math.random() * 8;
            p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${dur}s;animation-delay:${Math.random()*2}s;opacity:${0.2+Math.random()*0.5};`;
            pc.appendChild(p);
            setTimeout(() => { p.remove(); spawnParticle(); }, (dur + 2) * 1000);
        }
        for (let i = 0; i < 15; i++) {
            setTimeout(() => spawnParticle(), i * 400);
        }
    }

    // ========== PHASE 2: STORY ==========
    function startPhase2() {
        busy = true;
        showPhase('phase2', true);
        const n = nextNick();
        document.getElementById('letter-dear').textContent = 'My Dearest ' + n + ' ❤️';

        // Build letter body paragraphs
        const body = document.getElementById('letter-body');
        body.innerHTML = '';
        LETTER.forEach((text, i) => {
            const p = document.createElement('p');
            p.textContent = text.replace('{n}', n);
            p.classList.add('letter-reveal');
            body.appendChild(p);
        });

        // Staggered reveal of all letter elements
        const allReveals = document.querySelectorAll('#phase2 .letter-reveal');
        allReveals.forEach((el, i) => {
            setTimeout(() => { el.classList.add('visible'); }, 400 + i * 500);
        });

        // Show continue button after all paragraphs revealed
        const totalTime = 400 + allReveals.length * 500 + 800;
        setTimeout(() => {
            document.getElementById('letter-continue-btn').classList.add('visible');
        }, totalTime);
    }


    // ========== PHASE 3: QUIZ ==========
    function startPhase3() {
        if (quizActive) return;
        quizActive = true;
        busy = true;

        showPhase('phase3', true);
        quizIdx = 0; quizScore = 0; quizLocked = false;
        document.getElementById('quiz-area').classList.remove('hidden');
        document.getElementById('quiz-result').classList.add('hidden');
        showQuizQ();
    }

    function showQuizQ() {
        if (quizIdx >= QUIZ.length) { showQuizEnd(); return; }
        quizLocked = false;
        const q = QUIZ[quizIdx];
        document.getElementById('quiz-progress').textContent = 'Question ' + (quizIdx+1) + ' of ' + QUIZ.length;
        document.getElementById('quiz-q').textContent = q.q.replace('{n}', nickname);
        document.getElementById('quiz-fb').classList.add('hidden');
        const box = document.getElementById('quiz-opts');
        box.innerHTML = '';
        q.o.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'quiz-opt';
            b.textContent = o;
            b.onclick = () => pickAnswer(i);
            box.appendChild(b);
        });
    }

    function pickAnswer(i) {
        if (quizLocked || !quizActive) return;
        quizLocked = true;
        const q = QUIZ[quizIdx];
        const btns = document.querySelectorAll('.quiz-opt');
        btns.forEach((b, j) => { b.onclick = null; if (j === q.a) b.classList.add('correct'); });
        if (i === q.a) quizScore++;
        const fb = document.getElementById('quiz-fb');
        fb.textContent = q.f.replace('{n}', nickname);
        fb.classList.remove('hidden');
        setTimeout(() => {
            if (!quizActive) return;
            quizIdx++;
            showQuizQ();
        }, 2000);
    }

    function showQuizEnd() {
        document.getElementById('quiz-area').classList.add('hidden');
        const r = document.getElementById('quiz-result');
        r.classList.remove('hidden');
        const n = nextNick();
        document.getElementById('quiz-result-title').textContent = quizScore === QUIZ.length ? "Perfect Score, " + n + "!" : "You're Amazing, " + n + "!";
        document.getElementById('quiz-score').textContent = quizScore + ' / ' + QUIZ.length;
        document.getElementById('quiz-msg').textContent = "Every answer proves how special you are!";
        setTimeout(() => {
            quizActive = false;
            showPhase('phase3', false);
            busy = false;
            startPhase4();
        }, 3000);
    }

    // ========== PHASE 4: SPIN ==========
    function startPhase4() {
        busy = true;

        showPhase('phase4', true);
        canSpin = true;
        document.getElementById('spin-btn').disabled = false;
        document.getElementById('spin-result').classList.add('hidden');
        buildWheel();
    }

    function buildWheel() {
        const w = document.getElementById('wheel');
        w.innerHTML = '';
        w.style.transform = 'rotate(0deg)';
        const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6','#FCD34D','#FB923C'];
        const angle = 360 / SPIN_MSG.length;
        SPIN_MSG.forEach((_, i) => {
            const seg = document.createElement('div');
            seg.className = 'wheel-seg';
            seg.style.transform = 'rotate('+i*angle+'deg)';
            seg.style.background = colors[i % colors.length];
            w.appendChild(seg);
        });
    }

    function spinWheel() {
        if (!canSpin) return;
        canSpin = false;
        document.getElementById('spin-btn').disabled = true;
        const angle = 360 / SPIN_MSG.length;
        const pick = Math.floor(Math.random() * SPIN_MSG.length);
        const deg = 360 * 5 + (360 - pick * angle - angle/2);
        document.getElementById('wheel').style.transform = 'rotate('+deg+'deg)';
        setTimeout(() => {
            const n = nextNick();
            const res = document.getElementById('spin-result');
            res.textContent = SPIN_MSG[pick].replace('{n}', n) + ' For you, ' + n + '!';
            res.classList.remove('hidden');
            confetti();
            setTimeout(() => { showPhase('phase4', false); busy = false; startPhase5(); }, 4000);
        }, 4500);
    }

    // ========== PHASE 5: REASONS ==========
    function startPhase5() {
        busy = true;

        showPhase('phase5', true);
        const list = document.getElementById('reasons-list');
        list.innerHTML = '';
        REASON_IMGS.forEach((name, i) => {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.style.opacity = '0';
            card.innerHTML = '<img src="Fahamida/'+name+'.png" alt=""><div><div class="reason-num">'+String(i+1).padStart(2,'0')+'</div><div class="reason-text">'+REASON_TXT[i]+', '+nextNick()+'!</div></div>';
            list.appendChild(card);
            setTimeout(() => { card.style.opacity = '1'; card.classList.add('slide-up'); }, i * 250);
        });
        setTimeout(() => { showPhase('phase5', false); busy = false; startPhase6(); }, REASON_IMGS.length * 250 + 2000);
    }

    // ========== PHASE 6: FINALE ==========
    function startPhase6() {
        busy = true;

        showPhase('phase6', true);
        confetti();
        const grid = document.getElementById('mosaic');
        grid.innerHTML = '';
        FINALE_IMGS.forEach((name, i) => {
            const img = document.createElement('img');
            img.src = 'Fahamida/'+name+'.png';
            img.style.opacity = '0';
            grid.appendChild(img);
            setTimeout(() => { img.style.opacity = '1'; img.classList.add('scale-in'); }, i * 200);
        });
        setTimeout(() => {
            const letter = document.getElementById('letter');
            letter.classList.remove('hidden');
            letter.classList.add('slide-up');
            const n = nextNick();
            document.getElementById('letter-text').innerHTML = LETTER.map(l => l === '' ? '<br>' : '<p>'+l.replace('{n}',n)+'</p>').join('');
            document.getElementById('replay-btn').classList.remove('hidden');
            busy = false;
        }, FINALE_IMGS.length * 200 + 1500);
    }

    // ========== SKIP ==========
    function skip(phase) {
        if (busy && phase !== 1) return;
        if (slideTimer) clearInterval(slideTimer);
        stopCelebration();
        busy = false;
        const id = 'phase' + phase;
        showPhase(id, false);
        switch(phase) {
            case 1: startPhase2(); break;
            case 2: startPhase3(); break;
            case 3: startPhase4(); break;
            case 4: startPhase5(); break;
            case 5: startPhase6(); break;
        }
    }

    // ========== START ==========
    init();
    </script>
</body>
</html>
