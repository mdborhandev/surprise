<!DOCTYPE html>
<html lang="en" style="background:#000000">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahamida's Birthday Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Digital7';
            src: url('fonts/digital-7.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#000000',
                        card: '#0F0F0F',
                        accent: '#FBBF24',
                    },
                    fontFamily: {
                        digital: ['"Digital7"', 'monospace'],
                        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 40px rgba(255,255,255,0.2), 0 0 60px rgba(251,191,36,0.1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes star-twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        @keyframes tick {
            0%, 80%, 100% { transform: scale(1); }
            40% { transform: scale(1.1); }
        }
        .card-glow { animation: pulse-glow 2.5s ease-in-out infinite; }
        .float-anim { animation: float 3s ease-in-out infinite; }
        .shimmer-text {
            color: #FFFFFF;
        }
        .countdown-digit { transition: transform 0.3s ease; }
        .countdown-digit:hover { transform: scale(1.06); }
        .tick-anim { animation: tick 0.4s ease; }
        .star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: star-twinkle ease-in-out infinite;
        }
        body { font-family: 'DM Sans', system-ui, sans-serif; }
        .font-digital { font-family: 'Digital7', monospace; }
        .font-body { font-family: 'DM Sans', system-ui, sans-serif; }
    </style>
</head>
<body style="background:#000000" class="min-h-screen flex flex-col items-center justify-center px-4 py-8 relative overflow-hidden">

    <!-- Stars -->
    <div id="stars" class="fixed inset-0 pointer-events-none"></div>

    <!-- Title -->
    <div class="text-center mb-10 float-anim relative z-10">
        <p class="text-white/60 text-xs sm:text-sm font-body font-bold uppercase tracking-[0.35em] mb-4">Counting down to</p>
        <h1 class="font-digital text-4xl sm:text-5xl md:text-6xl lg:text-7xl shimmer-text leading-tight tracking-wider">
            Fahamida's Birthday
        </h1>
        <div class="w-16 h-0.5 bg-white/20 mx-auto mt-5 rounded-full"></div>
        <p class="text-white/50 text-sm sm:text-base font-body font-bold mt-5">Something beautiful is on its way</p>
    </div>

    <!-- Countdown Cards -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 sm:gap-5 max-w-3xl w-full mb-12 relative z-10">

        <div class="card-glow rounded-2xl p-5 sm:p-7 flex flex-col items-center border border-white/10" style="background:#0F0F0F">
            <span id="days" class="font-digital text-5xl sm:text-6xl md:text-7xl text-white countdown-digit tracking-wider">00</span>
            <span class="font-body text-[10px] sm:text-xs font-bold text-white/50 uppercase tracking-[0.2em] mt-3">Days</span>
        </div>

        <div class="card-glow rounded-2xl p-5 sm:p-7 flex flex-col items-center border border-white/10" style="background:#0F0F0F; animation-delay: 0.3s">
            <span id="hours" class="font-digital text-5xl sm:text-6xl md:text-7xl countdown-digit tracking-wider" style="color:#FFFFFF !important">00</span>
            <span class="font-body text-[10px] sm:text-xs font-bold text-white/50 uppercase tracking-[0.2em] mt-3">Hours</span>
        </div>

        <div class="card-glow rounded-2xl p-5 sm:p-7 flex flex-col items-center border border-white/10" style="background:#0F0F0F; animation-delay: 0.6s">
            <span id="minutes" class="font-digital text-5xl sm:text-6xl md:text-7xl text-white countdown-digit tracking-wider">00</span>
            <span class="font-body text-[10px] sm:text-xs font-bold text-white/50 uppercase tracking-[0.2em] mt-3">Minutes</span>
        </div>

        <div class="card-glow rounded-2xl p-5 sm:p-7 flex flex-col items-center border border-white/10" style="background:#0F0F0F; animation-delay: 0.9s">
            <span id="seconds" class="font-digital text-5xl sm:text-6xl md:text-7xl countdown-digit tracking-wider" style="color:#FFFFFF !important">00</span>
            <span class="font-body text-[10px] sm:text-xs font-bold text-white/50 uppercase tracking-[0.2em] mt-3">Seconds</span>
        </div>

    </div>

    <!-- Birthday message -->
    <div id="birthday-msg" class="hidden text-center relative z-10">
        <h2 class="font-digital text-4xl sm:text-5xl md:text-6xl shimmer-text mb-5 tracking-wider">Happy Birthday Fahamida!</h2>
        <p class="font-body text-lg text-white/60 font-bold">Make a wish!</p>
    </div>

    <!-- Font credit -->
    <p class="fixed bottom-3 right-4 text-[10px] text-white/20 font-body font-bold">Font: Digital-7 by Sizenko Alexander</p>

    <script>
        const target = new Date('2026-07-24T00:00:00').getTime();

        // Stars
        (function() {
            const c = document.getElementById('stars');
            for (let i = 0; i < 60; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                const size = (Math.random() * 2 + 1) + 'px';
                s.style.width = size;
                s.style.height = size;
                s.style.animationDuration = (Math.random() * 4 + 3) + 's';
                s.style.animationDelay = Math.random() * 4 + 's';
                c.appendChild(s);
            }
        })();

        let prevSeconds = -1;

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
                document.getElementById('birthday-msg').classList.remove('hidden');
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');

            if (s !== prevSeconds) {
                const el = document.getElementById('seconds');
                el.classList.remove('tick-anim');
                void el.offsetWidth;
                el.classList.add('tick-anim');
                prevSeconds = s;
            }
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
