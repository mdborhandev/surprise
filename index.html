<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fahamida's Birthday Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes confetti { 0% { transform: translateY(-100vh) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 0.8; } }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        .fade-out { animation: fadeOut 0.5s ease forwards; }
        .slide-up { animation: slideUp 0.6s ease forwards; }
        .scale-in { animation: scaleIn 0.5s ease forwards; }

        /* Stars */
        .star { position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite; pointer-events: none; }

        /* Music Button */
        #music-btn { position: fixed; top: 52px; right: 12px; z-index: 201; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        #music-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

        /* Skip Button */
        .skip-btn { position: fixed; bottom: 16px; right: 16px; z-index: 201; padding: 8px 18px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; }
        .skip-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

        /* Phase container */
        .phase { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; padding: 60px 20px 70px; overflow-y: auto; }
        .phase.active { display: flex; }

        /* Countdown */
        #countdown-phase { text-align: center; }
        .countdown-header { margin-bottom: 48px; }
        .countdown-tag { font-size: 14px; color: rgba(255,255,255,0.9); letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 24px; }
        .countdown-name { font-size: clamp(2.6rem, 10vw, 5rem); font-weight: 900; color: #fff; letter-spacing: 0.02em; margin-bottom: 24px; }
        .countdown-divider { width: 50px; height: 2px; background: rgba(251,191,36,0.5); margin: 0 auto 24px; }
        .countdown-sub { font-size: 15px; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; }
        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 600px; margin: 0 auto; }
        @media (max-width: 480px) { .countdown-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 340px; } }
        .count-box { position: relative; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.25); border-radius: 16px; padding: 32px 16px 24px; text-align: center; transition: border-color 0.4s ease; }
        .count-box:hover { border-color: rgba(255,255,255,0.5); }
        .count-num { font-size: clamp(3rem, 10vw, 5rem); font-weight: 700; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
        .count-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 12px; }

        /* Reveal */
        .reveal-box { text-align: center; max-width: 500px; }
        .reveal-title { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; color: #fff; margin-bottom: 12px; line-height: 1.2; }
        .reveal-sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
        .reveal-divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); margin: 0 auto 24px; }
        .reveal-hint { font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; }

        /* Slideshow */
        .slide-wrap { position: relative; width: 100%; max-width: 520px; margin: 0 auto; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; }
        .slide-img { width: 100%; max-height: 50vh; object-fit: contain; border-radius: 14px; transition: opacity 0.4s ease; }
        .slide-caption { text-align: center; padding: 16px 8px 8px; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; }
        .slide-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .slide-nav button { padding: 8px 16px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-family: 'Orbitron', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.3s; }
        .slide-nav button:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
        .slide-counter { position: absolute; top: 24px; left: 24px; font-size: 11px; color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; }
        .slide-progress { position: absolute; top: 20px; left: 20px; right: 20px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; z-index: 5; }
        .slide-progress-bar { height: 100%; background: rgba(255,255,255,0.35); border-radius: 1px; transition: width 0.5s ease; }
        .dots { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.3s ease; }
        .dot.active { background: #fff; transform: scale(1.4); }

        /* Quiz */
        .quiz-box { max-width: 480px; width: 100%; text-align: center; }
        .quiz-progress-text { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 20px; letter-spacing: 0.1em; text-transform: uppercase; }
        .quiz-q { font-size: clamp(1rem, 4vw, 1.4rem); margin-bottom: 28px; line-height: 1.5; color: rgba(255,255,255,0.9); }
        .quiz-opt { display: block; width: 100%; padding: 16px 18px; margin-bottom: 10px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-family: 'Orbitron', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.3s ease; text-align: left; letter-spacing: 0.02em; }
        .quiz-opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); color: #fff; }
        .quiz-opt.correct { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.5); color: #34D399; }
        .quiz-feedback { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.5); }

        /* Spin Wheel */
        .wheel-wrap { position: relative; width: 260px; height: 260px; margin: 0 auto 28px; }
        @media (min-width: 640px) { .wheel-wrap { width: 300px; height: 300px; } }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transition: transform 4s cubic-bezier(0.17,0.67,0.12,0.99); overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        .wheel-seg { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #fff; z-index: 10; }
        .spin-btn { padding: 14px 44px; border-radius: 30px; background: #fff; color: #000; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.15em; border: none; cursor: pointer; transition: all 0.3s ease; }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.15); }
        .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
        .spin-result { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.5; max-width: 400px; }

        /* Reasons */
        .reasons-list { max-width: 520px; width: 100%; }
        .reason-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 14px; margin-bottom: 10px; transition: border-color 0.3s; }
        .reason-card:hover { border-color: rgba(255,255,255,0.15); }
        .reason-card img { width: 72px; height: 72px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        @media (min-width: 640px) { .reason-card img { width: 88px; height: 88px; } }
        .reason-num { font-size: 1.2rem; color: rgba(255,255,255,0.1); margin-bottom: 4px; }
        .reason-text { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
        @media (min-width: 640px) { .reason-text { font-size: 13px; } }

        /* Finale */
        .mosaic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 380px; margin: 0 auto 28px; }
        @media (min-width: 640px) { .mosaic { grid-template-columns: repeat(3, 1fr); max-width: 450px; gap: 10px; } }
        .mosaic img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; transition: transform 0.3s ease; border: 1px solid rgba(255,255,255,0.06); }
        .mosaic img:hover { transform: scale(1.03); }
        .letter { max-width: 480px; width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px 28px; margin: 0 auto; }
        .letter h2 { text-align: center; margin-bottom: 20px; font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 800; color: #fff; }
        .letter p { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-bottom: 6px; }
        @media (min-width: 640px) { .letter p { font-size: 13px; } }
        .replay-btn { display: block; margin: 28px auto 0; padding: 12px 30px; border-radius: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; }
        .replay-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }

        /* Confetti */
        .confetti-piece { position: fixed; width: 8px; height: 8px; top: -10px; animation: confetti linear forwards; pointer-events: none; z-index: 300; }
    </style>
</head>
<body>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Music Button -->
    <button id="music-btn" class="hidden" onclick="toggleMusic()">&#9835;</button>

    <!-- COUNTDOWN -->
    <div id="countdown-phase" class="phase active" style="display:flex;">
        <div class="countdown-header">
            <p class="countdown-tag">Counting down to</p>
            <h1 id="title-name" class="countdown-name"></h1>
            <div class="countdown-divider"></div>
            <p class="countdown-sub">Something beautiful is on its way</p>
        </div>
        <div class="countdown-grid">
            <div class="count-box"><div id="cd-days" class="count-num">00</div><div class="count-label">Days</div></div>
            <div class="count-box"><div id="cd-hours" class="count-num">00</div><div class="count-label">Hours</div></div>
            <div class="count-box"><div id="cd-mins" class="count-num">00</div><div class="count-label">Minutes</div></div>
            <div class="count-box"><div id="cd-secs" class="count-num">00</div><div class="count-label">Seconds</div></div>
        </div>
    </div>

    <!-- PHASE 1: REVEAL -->
    <div id="phase1" class="phase">
        <button class="skip-btn" onclick="skip(1)">SKIP &#8594;</button>
        <div id="p1-content" class="reveal-box" style="opacity:0;">
            <h1 id="reveal-title" class="reveal-title"></h1>
            <p id="reveal-sub" class="reveal-sub"></p>
            <div class="reveal-divider"></div>
            <p class="reveal-hint">Your surprise awaits...</p>
        </div>
    </div>

    <!-- PHASE 2: STORY -->
    <div id="phase2" class="phase">
        <button class="skip-btn" onclick="skip(2)">SKIP &#8594;</button>
        <div class="slide-wrap">
            <div class="slide-progress"><div id="slide-bar" class="slide-progress-bar"></div></div>
            <div class="slide-counter" id="slide-counter">1 / 14</div>
            <img id="slide-img" class="slide-img" src="" alt="">
            <div class="slide-caption" id="slide-text"></div>
            <div class="slide-nav">
                <button onclick="prevSlide()">&#8592; Prev</button>
                <div class="dots" id="slide-dots"></div>
                <button onclick="nextSlide()">Next &#8594;</button>
            </div>
        </div>
    </div>

    <!-- PHASE 3: QUIZ -->
    <div id="phase3" class="phase">
        <button class="skip-btn" onclick="skip(3)">SKIP &#8594;</button>
        <div class="quiz-box">
            <div id="quiz-area">
                <div class="quiz-progress-text" id="quiz-progress"></div>
                <div class="quiz-q" id="quiz-q"></div>
                <div id="quiz-opts"></div>
                <div class="quiz-feedback hidden" id="quiz-fb"></div>
            </div>
            <div id="quiz-result" class="hidden" style="text-align:center;">
                <h2 id="quiz-result-title" class="reveal-title" style="margin-bottom:12px;"></h2>
                <p id="quiz-score" style="color:rgba(255,255,255,0.5); margin-bottom:6px; font-size:14px;"></p>
                <p id="quiz-msg" style="color:rgba(255,255,255,0.3); font-size:12px;"></p>
            </div>
        </div>
    </div>

    <!-- PHASE 4: SPIN -->
    <div id="phase4" class="phase">
        <button class="skip-btn" onclick="skip(4)">SKIP &#8594;</button>
        <h2 class="reveal-title" style="margin-bottom:6px;">Spin the Wheel</h2>
        <p style="font-size:12px; color:rgba(255,255,255,0.3); margin-bottom:28px;">Spin to reveal a message</p>
        <div class="wheel-wrap">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel"></div>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="spinWheel()">SPIN</button>
        <div class="spin-result hidden" id="spin-result"></div>
    </div>

    <!-- PHASE 5: REASONS -->
    <div id="phase5" class="phase" style="justify-content:flex-start; padding-top:70px;">
        <button class="skip-btn" onclick="skip(5)">SKIP &#8594;</button>
        <h2 class="reveal-title" style="margin-bottom:24px;">Reasons I Love You</h2>
        <div class="reasons-list" id="reasons-list"></div>
    </div>

    <!-- PHASE 6: FINALE -->
    <div id="phase6" class="phase">
        <div class="mosaic" id="mosaic"></div>
        <div class="letter hidden" id="letter">
            <h2>Happy Birthday!</h2>
            <div id="letter-text"></div>
        </div>
        <button class="replay-btn hidden" id="replay-btn" onclick="location.reload()">&#8634; Watch Again</button>
    </div>

    <!-- Audio -->
    <audio id="bg-music" loop preload="auto">
        <source src="Fahamida/Happy Birthday To You Ji - Funny Hindi Birthday Song (Part 1) - Funzoa Mimi Teddy, Krsna Solo.mp3" type="audio/mpeg">
    </audio>

    <script>
    // ========== CONFIG ==========
    const NICKNAMES = ['Paki','Monu','Fahu','Sonamoni','Baby','My Pet','My Sajna'];
    const IMAGES = ['Paki','Monu','Fahu','Sonamoni','Baby','My Pet','My Sajna','Jaan','Jaanu','Sweetheart','Princess','Darling','Honey','My Queen','Angel','Beautiful','Cutie','Babu','Shona','Gudiya','Rani','Mere Dil','Meri Jaan','Pyaari','Choti','Jaane Jaan','Dil Ki Dhadkan','Meri Zindagi'];

    const STORY_IMGS = IMAGES.slice(0, 28);

        "Your presence makes my world complete, {n}",
        "I am blessed to know you, {n}",
        "You are my forever and always, {n}",
        "Your smile is contagious, {n}",
        "Happy birthday to the most amazing person, {n}"
    ];

    const REASON_IMGS = IMAGES.slice(14, 22);
    const REASON_TXT = [
        "Your smile lights up my world",
        "Your laugh makes everything better",
        "Your kindness touches everyone",
        "You are so strong and brave",
        "Your eyes sparkle like stars",
        "You make me a better person",
        "Your voice is my favorite sound",
        "You always make me smile"
    ];
    const FINALE_IMGS = IMAGES.slice(22, 28);

    const QUIZ = [
        { q: "What do I love most about you, {n}?", o: ["Your smile","Your heart","Your spirit","All of you"], a: 3, f: "I love ALL of you, {n}!" },
        { q: "How does my heart feel when I see you, {n}?", o: ["Skips a beat","Sings with joy","Feels complete","All of these"], a: 3, f: "My heart dances with joy, {n}!" },
        { q: "What makes you special, {n}?", o: ["Your beauty","Your kindness","Your spirit","Everything"], a: 3, f: "Everything about you is special, {n}!" },
        { q: "How would I describe you, {n}?", o: ["Beautiful","Amazing","Perfect","All of the above"], a: 3, f: "You are all of these and more, {n}!" },
        { q: "How long will I love you, {n}?", o: ["Forever","Until end of time","For eternity","All of these"], a: 3, f: "Forever and always, {n}!" }
    ];

    const SPIN_MSG = [
        "You are the most beautiful person I know, {n}!",
        "Your smile makes my heart melt, {n}!",
        "I am so lucky to have you, {n}!",
        "You are my sunshine, {n}!",
        "Your beauty takes my breath away, {n}!",
        "I cherish every moment with you, {n}!",
        "You make my world complete, {n}!",
        "Happy birthday, {n}!"
    ];

    const LETTER = [
        "My dearest {n},",
        "",
        "Today is YOUR special day. I want you to know how incredible you are.",
        "",
        "You light up every room with your beautiful smile.",
        "Your kindness touches everyone lucky enough to know you.",
        "",
        "From the moment I met you, I knew you were special.",
        "Your beauty, inside and out, amazes me every day.",
        "",
        "Thank you for being YOU.",
        "Thank you for making the world brighter.",
        "",
        "On this birthday, I wish you all the happiness you deserve.",
        "May all your dreams come true.",
        "",
        "You are stronger and more beautiful than you know.",
        "I am so grateful to have you in my life.",
        "",
        "Happy Birthday, {n}. You are one of a kind.",
        "",
        "With all my love,",
        "Yours always"
    ];

    // ========== STATE ==========
    let target, nickname, musicPlaying = false, slideTimer, countdownTimer;
    let currentSlide = 0, quizIdx = 0, quizScore = 0, quizLocked = false;
    let canSpin = true, busy = false, quizActive = false, surpriseStarted = false;

    // ========== INIT ==========
    async function init() {
        createStars();
        try {
            const r = await fetch('birthday.json');
            const d = await r.json();
            target = new Date(d.birthday + 'T00:00:00').getTime();
            nickname = rand(NICKNAMES);
            document.getElementById('title-name').textContent = d.name + "'s Birthday";
            document.getElementById('reveal-title').textContent = "Happy Birthday " + d.name + "!";
            document.getElementById('reveal-sub').textContent = "Hey " + nickname + ", this is for you!";
        } catch(e) {
            target = new Date('2026-07-10T00:00:00').getTime();
            nickname = 'Baby';
            document.getElementById('title-name').textContent = "Fahamida's Birthday";
            document.getElementById('reveal-title').textContent = "Happy Birthday Fahamida!";
            document.getElementById('reveal-sub').textContent = "Hey Baby, this is for you!";
        }
        updateCD();
        countdownTimer = setInterval(updateCD, 1000);
    }

    function createStars() {
        const c = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
            c.appendChild(s);
        }
    }

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // ========== COUNTDOWN ==========
    function updateCD() {
        const diff = target - Date.now();
        if (diff <= 0) {
            clearInterval(countdownTimer);
            if (!surpriseStarted) {
                surpriseStarted = true;
                showPhase('countdown-phase', false);
                startSurprise();
            }
            return;
        }
        const d = Math.floor(diff / 864e5);
        const h = Math.floor((diff % 864e5) / 36e5);
        const m = Math.floor((diff % 36e5) / 6e4);
        const s = Math.floor((diff % 6e4) / 1e3);
        document.getElementById('cd-days').textContent = String(d).padStart(2, '0');
        document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
        document.getElementById('cd-mins').textContent = String(m).padStart(2, '0');
        document.getElementById('cd-secs').textContent = String(s).padStart(2, '0');
    }

    // ========== PHASE MANAGEMENT ==========
    function showPhase(id, show) {
        const el = document.getElementById(id);
        if (show) { el.classList.add('active'); el.style.display = 'flex'; }
        else { el.classList.remove('active'); el.style.display = 'none'; }
    }

    function startSurprise() {
        document.getElementById('music-btn').classList.add('hidden');
        const music = document.getElementById('bg-music');
        music.volume = 0.5;
        music.play().then(() => { musicPlaying = true; document.getElementById('music-btn').classList.remove('hidden'); document.getElementById('music-btn').innerHTML = '&#9835;'; })
        .catch(() => { document.getElementById('music-btn').innerHTML = '&#128263;'; });
        setTimeout(() => startPhase1(), 300);
    }

    function toggleMusic() {
        const m = document.getElementById('bg-music');
        const btn = document.getElementById('music-btn');
        if (musicPlaying) { m.pause(); btn.innerHTML = '&#128263;'; musicPlaying = false; }
        else { m.play().then(() => { btn.innerHTML = '&#9835;'; musicPlaying = true; }).catch(() => {}); }
    }

    // ========== CONFETTI ==========
    function confetti() {
        const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6'];
        for (let i = 0; i < 40; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.cssText = `left:${Math.random()*100}vw;background:${rand(colors)};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*2}s;`;
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }
    }

    // ========== PHASE 1: REVEAL ==========
    function startPhase1() {
        busy = true;

        showPhase('phase1', true);
        setTimeout(() => { document.getElementById('p1-content').classList.add('fade-in'); confetti(); }, 200);
        setTimeout(() => {
            showPhase('phase1', false);
            busy = false;
            startPhase2();
        }, 4000);
    }

    // ========== PHASE 2: STORY ==========
    function startPhase2() {
        busy = true;

        showPhase('phase2', true);
        currentSlide = 0;
        buildDots();
        showSlide(0);
        slideTimer = setInterval(() => {
            if (currentSlide >= STORY_IMGS.length - 1) {
                clearInterval(slideTimer);
                setTimeout(() => { showPhase('phase2', false); busy = false; startPhase3(); }, 1500);
                return;
            }
            currentSlide++;
            showSlide(currentSlide);
        }, 3000);
    }

    function buildDots() {
        const c = document.getElementById('slide-dots');
        c.innerHTML = '';
        STORY_IMGS.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = 'dot' + (i === 0 ? ' active' : '');
            d.onclick = () => { currentSlide = i; showSlide(i); };
            c.appendChild(d);
        });
    }

    function showSlide(i) {
        const img = document.getElementById('slide-img');
        img.style.opacity = '0';
        setTimeout(() => {
            img.src = 'Fahamida/' + STORY_IMGS[i] + '.png';
            img.style.opacity = '1';
            document.getElementById('slide-text').textContent = STORY_TXT[i].replace('{n}', rand(NICKNAMES));
            document.getElementById('slide-counter').textContent = (i+1) + ' / ' + STORY_IMGS.length;
            document.getElementById('slide-bar').style.width = ((i+1)/STORY_IMGS.length*100) + '%';
            document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i));
        }, 200);
    }

    function prevSlide() { if (currentSlide > 0) { currentSlide--; showSlide(currentSlide); } }
    function nextSlide() { if (currentSlide < STORY_IMGS.length - 1) { currentSlide++; showSlide(currentSlide); } }

    // ========== PHASE 3: QUIZ ==========
    function startPhase3() {
        if (quizActive) return;
        quizActive = true;
        busy = true;

        showPhase('phase3', true);
        quizIdx = 0; quizScore = 0; quizLocked = false;
        document.getElementById('quiz-area').classList.remove('hidden');
        document.getElementById('quiz-result').classList.add('hidden');
        showQuizQ();
    }

    function showQuizQ() {
        if (quizIdx >= QUIZ.length) { showQuizEnd(); return; }
        quizLocked = false;
        const q = QUIZ[quizIdx];
        document.getElementById('quiz-progress').textContent = 'Question ' + (quizIdx+1) + ' of ' + QUIZ.length;
        document.getElementById('quiz-q').textContent = q.q.replace('{n}', nickname);
        document.getElementById('quiz-fb').classList.add('hidden');
        const box = document.getElementById('quiz-opts');
        box.innerHTML = '';
        q.o.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'quiz-opt';
            b.textContent = o;
            b.onclick = () => pickAnswer(i);
            box.appendChild(b);
        });
    }

    function pickAnswer(i) {
        if (quizLocked || !quizActive) return;
        quizLocked = true;
        const q = QUIZ[quizIdx];
        const btns = document.querySelectorAll('.quiz-opt');
        btns.forEach((b, j) => { b.onclick = null; if (j === q.a) b.classList.add('correct'); });
        if (i === q.a) quizScore++;
        const fb = document.getElementById('quiz-fb');
        fb.textContent = q.f.replace('{n}', nickname);
        fb.classList.remove('hidden');
        setTimeout(() => {
            if (!quizActive) return;
            quizIdx++;
            showQuizQ();
        }, 2000);
    }

    function showQuizEnd() {
        document.getElementById('quiz-area').classList.add('hidden');
        const r = document.getElementById('quiz-result');
        r.classList.remove('hidden');
        const n = rand(NICKNAMES);
        document.getElementById('quiz-result-title').textContent = quizScore === QUIZ.length ? "Perfect Score, " + n + "!" : "You're Amazing, " + n + "!";
        document.getElementById('quiz-score').textContent = quizScore + ' / ' + QUIZ.length;
        document.getElementById('quiz-msg').textContent = "Every answer proves how special you are!";
        setTimeout(() => {
            quizActive = false;
            showPhase('phase3', false);
            busy = false;
            startPhase4();
        }, 3000);
    }

    // ========== PHASE 4: SPIN ==========
    function startPhase4() {
        busy = true;

        showPhase('phase4', true);
        canSpin = true;
        document.getElementById('spin-btn').disabled = false;
        document.getElementById('spin-result').classList.add('hidden');
        buildWheel();
    }

    function buildWheel() {
        const w = document.getElementById('wheel');
        w.innerHTML = '';
        w.style.transform = 'rotate(0deg)';
        const colors = ['#FBBF24','#F87171','#A78BFA','#34D399','#60A5FA','#F472B6','#FCD34D','#FB923C'];
        const angle = 360 / SPIN_MSG.length;
        SPIN_MSG.forEach((_, i) => {
            const seg = document.createElement('div');
            seg.className = 'wheel-seg';
            seg.style.transform = 'rotate('+i*angle+'deg)';
            seg.style.background = colors[i % colors.length];
            w.appendChild(seg);
        });
    }

    function spinWheel() {
        if (!canSpin) return;
        canSpin = false;
        document.getElementById('spin-btn').disabled = true;
        const angle = 360 / SPIN_MSG.length;
        const pick = Math.floor(Math.random() * SPIN_MSG.length);
        const deg = 360 * 5 + (360 - pick * angle - angle/2);
        document.getElementById('wheel').style.transform = 'rotate('+deg+'deg)';
        setTimeout(() => {
            const n = rand(NICKNAMES);
            const res = document.getElementById('spin-result');
            res.textContent = SPIN_MSG[pick].replace('{n}', n) + ' For you, ' + n + '!';
            res.classList.remove('hidden');
            confetti();
            setTimeout(() => { showPhase('phase4', false); busy = false; startPhase5(); }, 4000);
        }, 4500);
    }

    // ========== PHASE 5: REASONS ==========
    function startPhase5() {
        busy = true;

        showPhase('phase5', true);
        const list = document.getElementById('reasons-list');
        list.innerHTML = '';
        REASON_IMGS.forEach((name, i) => {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.style.opacity = '0';
            card.innerHTML = '<img src="Fahamida/'+name+'.png" alt=""><div><div class="reason-num">'+String(i+1).padStart(2,'0')+'</div><div class="reason-text">'+REASON_TXT[i]+', '+NICKNAMES[i%NICKNAMES.length]+'!</div></div>';
            list.appendChild(card);
            setTimeout(() => { card.style.opacity = '1'; card.classList.add('slide-up'); }, i * 250);
        });
        setTimeout(() => { showPhase('phase5', false); busy = false; startPhase6(); }, REASON_IMGS.length * 250 + 2000);
    }

    // ========== PHASE 6: FINALE ==========
    function startPhase6() {
        busy = true;

        showPhase('phase6', true);
        confetti();
        const grid = document.getElementById('mosaic');
        grid.innerHTML = '';
        FINALE_IMGS.forEach((name, i) => {
            const img = document.createElement('img');
            img.src = 'Fahamida/'+name+'.png';
            img.style.opacity = '0';
            grid.appendChild(img);
            setTimeout(() => { img.style.opacity = '1'; img.classList.add('scale-in'); }, i * 200);
        });
        setTimeout(() => {
            const letter = document.getElementById('letter');
            letter.classList.remove('hidden');
            letter.classList.add('slide-up');
            const n = rand(NICKNAMES);
            document.getElementById('letter-text').innerHTML = LETTER.map(l => l === '' ? '<br>' : '<p>'+l.replace('{n}',n)+'</p>').join('');
            document.getElementById('replay-btn').classList.remove('hidden');
            busy = false;
        }, FINALE_IMGS.length * 200 + 1500);
    }

    // ========== SKIP ==========
    function skip(phase) {
        if (busy) return;
        if (slideTimer) clearInterval(slideTimer);
        const id = 'phase' + phase;
        showPhase(id, false);
        switch(phase) {
            case 1: startPhase2(); break;
            case 2: startPhase3(); break;
            case 3: startPhase4(); break;
            case 4: startPhase5(); break;
            case 5: startPhase6(); break;
        }
    }

    // ========== START ==========
    init();
    </script>
</body>
</html>
